services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - '4000:4000'
    environment:
      PORT: '4000'
      CORS_ORIGIN: 'http://localhost:3000'
      DB_PATH: '/data/todos.db'
    volumes:
      - backend_data:/data
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: 'http://localhost:4000'
    ports:
      - '3000:80'
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend_data:
